spring:
  application:
    name: intellcap

  datasource:
    url: jdbc:h2:mem:intellcap
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

app:
  jwt:
    secret: intellcap-secret-key-change-in-production-must-be-at-least-256-bits-long
    expiration-ms: 86400000
